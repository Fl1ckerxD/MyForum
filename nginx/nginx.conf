events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Базовые настройки оптимизации
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;  # Для загрузки файлов на форум

    # Настройки сжатия
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss 
               application/json image/svg+xml;

    # Upstream для балансировки нагрузки (можно добавить несколько серверов)
    upstream backend {
        server myforum-api:80;
        # server myforum-api2:80;  # Второй экземпляр при масштабировании
    }

    # Виртуальный хост
    server {
        listen 80;
        server_name localhost;

        # Проксирование API запросов на ASP.NET Core
        location /api/ {
            proxy_pass http://myforum-api:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Увеличение таймаутов для длительных операций
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Health checks для мониторинга
        location /health {
            proxy_pass http://myforum-api:80/health;
            access_log off;
        }

        # Получение файлов из объектного хранилища
        location /uploads/ {
            proxy_pass http://minio:9000;
            proxy_set_header Host minio:9000;
        }

        # ADMIN
        location /admin/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /admin/index.html;
            
            # Долгое кэширование для статики
            location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # FORUM
        location / {
            root /usr/share/nginx/html/forum;
            try_files $uri $uri/ /index.html;
            
            # Долгое кэширование для статики
            location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}