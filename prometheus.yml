global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "myforum-api"
    static_configs:
      - targets: ["myforum-api:80"]
    metrics_path: /metrics

  - job_name: "myforum-api_health"
    static_configs:
      - targets: ["myforum-api:80"]
    metrics_path: /healthmetrics

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
