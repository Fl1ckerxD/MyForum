name: Continuous Integration

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        
      - name: Install .NET 9.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore MyForum.sln

      - name: Build
        run: dotnet build MyForum.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test MyForum.Api.Tests/MyForum.Api.Tests.csproj --no-build --logger trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4.6.2
        if: ${{ always() }}
        with:
          name: MyForum-api-test-results
          path: "**/*.trx"

      - name: Build Docker image
        run: docker compose build
